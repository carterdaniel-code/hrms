name: Build and Push HRMS

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.PROD_PROJECT_ID }}
  REGION: ${{ secrets.PROD_ARTIFACT_REGISTRY_REGION }}
  REPOSITORY: ${{ secrets.PROD_ARTIFACT_REPO }}
  IMAGE_NAME: hrms

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      image: ${{ steps.image.outputs.uri }}
      tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.PROD_APP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.PROD_GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Artifact Registry authentication
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set image coordinates
        id: image
        shell: bash
        run: |
          set -Eeuo pipefail
          image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish deployment summary
        run: |
          {
            echo "### HRMS image published"
            echo
            echo "\`${{ steps.image.outputs.uri }}:${{ steps.image.outputs.tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
